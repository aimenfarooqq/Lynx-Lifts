{% load static %}
<!DOCTYPE html>
<html>
<head><link rel="stylesheet" href="{% static 'styles.css' %}?v=5"></head>
<body>
<h1>Driver Sign Up</h1>
{% for message in messages %}<h5>{{message}}</h5>{% endfor %}
<form method="POST">
    {% csrf_token %}
    <p>Full Name:</p><input type="text" name="username" />
    <p>Driver Name (displayed to passengers):</p><input type="text" name="name" />
    <p>Email:</p><input type="text" name="email" />
    <p>Car Model:</p><input type="text" name="car_model" />
    <p>License Plate:</p><input type="text" name="license_plate" />
    <p>Password:</p><input type="password" name="password" />
    <p>Repeat Password:</p><input type="password" name="password2" />
    <input type="submit" value="Register as Driver" />
</form>
</body>
</html>
